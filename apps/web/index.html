<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRMPEB ATS — Applicant Tracking System</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231F3C88'/><text y='.9em' x='50%25' text-anchor='middle' font-size='60' font-weight='900' fill='%23F4B400'>H</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ── Reset ─────────────────────────────────────── */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; font-size: 17.5px; }

      /* ── Brand Tokens ───────────────────────────────── */
      :root {
        /* Brand Colors */
        --clr-primary:       #1F3C88;
        --clr-primary-dark:  #162c6a;
        --clr-primary-light: #2d52b8;
        --clr-primary-pale:  #eef2fc;

        --clr-gold:          #F4B400;
        --clr-gold-dark:     #d4a000;
        --clr-gold-pale:     #fffbea;

        --clr-green:         #008753;
        --clr-green-light:   #00a566;
        --clr-green-pale:    #e6f4ee;

        --clr-red:           #dc2626;
        --clr-red-pale:      #fef2f2;

        --clr-white:         #ffffff;
        --clr-bg:            #ffffff;
        --clr-surface:       #ffffff;

        /* Text */
        --clr-text:          #111827;
        --clr-text-soft:     #334155;
        --clr-muted:         #64748b;
        --clr-subtle:        #94a3b8;
        --clr-border:        #dbe3ef;
        --clr-border-soft:   #e9eef5;

        /* Shadows */
        --shadow-sm:   0 1px 3px rgba(15, 23, 42, 0.05);
        --shadow-md:   0 8px 24px rgba(15, 23, 42, 0.06);
        --shadow-lg:   0 14px 40px rgba(15, 23, 42, 0.09);
        --shadow-xl:   0 24px 64px rgba(15, 23, 42, 0.12);

        /* Spacing */
        --space-xs:  4px;
        --space-sm:  8px;
        --space-md:  16px;
        --space-lg:  24px;
        --space-xl:  32px;
        --space-2xl: 48px;
        --space-3xl: 64px;

        /* Radii */
        --radius-sm:   6px;
        --radius-md:   10px;
        --radius-lg:   16px;
        --radius-xl:   24px;
        --radius-full: 9999px;

        /* Typography */
        --font-body:    'Manrope', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
        --font-display: 'Outfit', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;

        /* Transitions */
        --transition-fast: 0.15s ease;
        --transition-base: 0.25s ease;
        --transition-slow: 0.4s ease;

        /* Sidebar */
        --sidebar-w: 240px;
        --sidebar-collapsed: 68px;

        /* Navbar */
        --navbar-h: 68px;
      }

      /* ── Base ───────────────────────────────────────── */
      body {
        font-family: var(--font-body);
        background: var(--clr-bg);
        color: var(--clr-text);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Keep emoji/icon glyphs stable across Windows/macOS/Linux */
      .emoji-icon,
      [data-icon='emoji'] {
        font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', 'Segoe UI Symbol', sans-serif !important;
      }

      a { text-decoration: none; color: inherit; }
      button { font-family: inherit; cursor: pointer; }
      input, select, textarea { font-family: inherit; }
      img { max-width: 100%; display: block; }

      /* ── Scrollbar ──────────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: var(--clr-border-soft); }
      ::-webkit-scrollbar-thumb { background: var(--clr-primary); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--clr-primary-light); }

      /* ── Utility animations ─────────────────────────── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeInLeft {
        from { opacity: 0; transform: translateX(-16px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-12px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes shimmer {
        from { background-position: -200% 0; }
        to   { background-position:  200% 0; }
      }

      .animate-fade-in    { animation: fadeIn 0.4s ease forwards; }
      .animate-scale-in   { animation: scaleIn 0.3s ease forwards; }
      .animate-float      { animation: float 4s ease-in-out infinite; }
      .animate-spin       { animation: spin 1s linear infinite; }

      /* Staggered children */
      .stagger > *:nth-child(1) { animation-delay: 0.05s; }
      .stagger > *:nth-child(2) { animation-delay: 0.10s; }
      .stagger > *:nth-child(3) { animation-delay: 0.15s; }
      .stagger > *:nth-child(4) { animation-delay: 0.20s; }
      .stagger > *:nth-child(5) { animation-delay: 0.25s; }
      .stagger > *:nth-child(6) { animation-delay: 0.30s; }

      /* ── Skeleton loader ────────────────────────────── */
      .skeleton {
        background: linear-gradient(90deg, #f0f2f5 25%, #e8eaee 50%, #f0f2f5 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: var(--radius-md);
      }

      /* ── Focus visible ──────────────────────────────── */
      *:focus-visible {
        outline: 2px solid var(--clr-gold);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
      }

      /* ── Selection ──────────────────────────────────── */
      ::selection {
        background: var(--clr-primary);
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
